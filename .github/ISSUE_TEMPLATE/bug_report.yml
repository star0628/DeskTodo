name: Bug report
description: Report a reproducible DeskTodo problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include real Todo Store files, credentials, or private task titles. Security issues must use private vulnerability reporting.
  - type: input
    id: version
    attributes:
      label: DeskTodo version
      placeholder: v0.2.0
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use synthetic task names.
      placeholder: "1. Start DeskTodo\n2. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove usernames, local paths, task titles, and other private data.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and removed private data from this report.
          required: true
